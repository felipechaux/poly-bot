# ============================================================
# Polymarket Bot — Default Configuration
# Override any value via environment variables or .env
# ============================================================

# --- Market Data Feed ---
feed:
  poll_interval_seconds: 2        # Order book polling interval
  market_refresh_seconds: 60      # Full market metadata refresh
  max_markets: 50                 # Maximum markets to track simultaneously

# --- Risk Management ---
risk:
  max_position_size_usdc: 500.0   # Max single position in USDC
  max_total_exposure_usdc: 3000.0 # Max total portfolio exposure
  max_position_count: 10          # Max concurrent open positions
  min_market_liquidity_usdc: 1000.0  # Min market liquidity to consider
  min_price: 0.02                 # Reject orders below this price
  max_price: 0.98                 # Reject orders above this price
  order_debounce_seconds: 30      # Prevent duplicate signals within window

# --- Paper Trading ---
paper:
  initial_balance_usdc: 5000.0
  fill_mode: "order_book"         # "instant" | "order_book"
  simulated_latency_ms: 200       # Simulated fill latency

# --- Strategies ---
strategies:

  mean_reversion:
    enabled: true
    # Markets to target (applies filters in order)
    market_filters:
      min_liquidity_usdc: 2000.0
      # category: "Politics"      # Uncomment to restrict by category
    params:
      # Buy YES when price < low_threshold (market oversold)
      low_threshold: 0.07
      # Buy NO when price > high_threshold (market overbought)
      high_threshold: 0.93
      # Close position when price reverts past this point
      exit_threshold: 0.15        # Relative to entry side
      position_size_usdc: 100.0

  ai_research:
    enabled: true
    params:
      # Gemini model to use (gemini-1.5-flash free tier: 1,500 req/day)
      # Options: gemini-1.5-flash | gemini-2.0-flash | gemini-1.5-pro
      model: "gemini-1.5-flash"
      # Minimum gap between Claude's estimate and market price to enter a trade
      min_edge_pct: 0.10          # 10% edge required (e.g. Claude thinks 65%, market says 52%)
      # Minimum confidence level: low | medium | high | very_high
      min_confidence: "high"
      # USDC per trade
      position_size_usdc: 150.0
      # How often to re-research each market (minutes)
      research_interval_min: 20.0
      # Max markets to research per feed cycle (cost control)
      max_markets_per_cycle: 3
      # Only research markets above this liquidity (USDC)
      min_research_liquidity: 10000.0

  momentum:
    enabled: false
    market_filters:
      min_liquidity_usdc: 5000.0
    params:
      # Minimum 1-hour price change % to enter
      min_change_pct: 5.0
      # Exit when momentum reverses by this %
      reversal_pct: 2.0
      position_size_usdc: 100.0
      # How many consecutive updates must confirm direction
      confirmation_periods: 3
