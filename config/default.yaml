# ============================================================
# Polymarket Bot — Default Configuration
# Override any value via environment variables or .env
# ============================================================

# --- Market Data Feed ---
feed:
  poll_interval_seconds: 5        # Order book polling interval (was 2 — reduced load)
  market_refresh_seconds: 300     # Full market metadata refresh (was 60 — fetch 200 markets takes longer)
  max_markets: 60                 # Slots to fill across all categories (was 50)

# --- Risk Management ---
risk:
  max_position_size_usdc: 500.0   # Max single position in USDC
  max_total_exposure_usdc: 3000.0 # Max total portfolio exposure
  max_position_count: 10          # Max concurrent open positions
  min_market_liquidity_usdc: 1000.0  # Min market liquidity to consider
  min_price: 0.02                 # Reject orders below this price
  max_price: 0.98                 # Reject orders above this price
  order_debounce_seconds: 30      # Prevent duplicate signals within window

# --- Paper Trading ---
paper:
  initial_balance_usdc: 5000.0
  fill_mode: "order_book"         # "instant" | "order_book"
  simulated_latency_ms: 200       # Simulated fill latency

# --- Strategies ---
strategies:

  mean_reversion:
    enabled: true
    market_filters:
      min_liquidity_usdc: 5000.0  # Raised: only liquid markets
    params:
      # Buy YES when price is very cheap (oversold)
      low_threshold: 0.07         # Was 0.15 — tighter entry, stronger signal
      # Buy NO when price is very expensive (overbought)
      high_threshold: 0.93        # Was 0.85 — symmetric
      # Exit when price reverts to this level (must be > low_threshold for profit)
      exit_threshold: 0.18        # Was 0.15 = same as entry! Now gives real profit margin
      position_size_usdc: 75.0    # Was 100 — smaller to preserve capital
      # Stop-loss: exit when position is down this fraction of cost basis
      stop_loss_pct: 0.35         # Exit if down 35%
      # Max days to hold before force-exiting stale positions
      max_hold_days: 14

  ai_research:
    enabled: true
    params:
      min_edge_pct: 0.12          # Was 0.05 — require 12% edge, not 5%
      min_confidence: "high"      # Was "medium" — only trade high-confidence calls
      position_size_usdc: 100.0   # Was 150 — smaller to preserve capital
      research_interval_min: 30.0 # Was 20 — less frequent, better quality
      max_markets_per_cycle: 3
      min_research_liquidity: 10000.0  # Was 3000 — only well-funded markets
      # Stop-loss: exit when position is down this fraction of cost basis
      stop_loss_pct: 0.30         # Exit if down 30%
      # Max days to hold before force-exiting
      max_hold_days: 7            # AI trades should resolve quickly

  momentum:
    enabled: false
    market_filters:
      min_liquidity_usdc: 5000.0
    params:
      # Minimum 1-hour price change % to enter
      min_change_pct: 5.0
      # Exit when momentum reverses by this %
      reversal_pct: 2.0
      position_size_usdc: 100.0
      # How many consecutive updates must confirm direction
      confirmation_periods: 3
